<header class="top">
<div class="wrap">

<h1>IPv4 Subnet Calculator</h1>
<p class="subtitle">Enter an IP address and CIDR prefix to calculate subnet details instantly.</p>

<div class="card">
<div class="row">
<div class="field" style="flex:2">
<label for="ip">IP Address</label>
<input type="text" id="ip" placeholder="192.168.1.0" value="192.168.1.0">
</div>

<label for="cidr">CIDR Prefix</label>
<input type="text" id="cidr" placeholder="/24" value="24">
</div>

</div>

<button onclick="preset(24)">/24 (254 hosts)</button>
<button onclick="preset(25)">/25 (126 hosts)</button>
<button onclick="preset(26)">/26 (62 hosts)</button>
<button onclick="preset(27)">/27 (30 hosts)</button>
<button onclick="preset(28)">/28 (14 hosts)</button>
<button onclick="preset(16)">/16 (65534 hosts)</button>
<button onclick="preset(8)">/8 (16M hosts)</button>
</div>

</div>

<script>
function ipToLong(ip) {
  const parts = ip.split('.').map(Number);
  return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
}
function longToIp(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}
function toBin(n) {
  return ((n >>> 0).toString(2)).padStart(8, '0');
}
function isValidIp(ip) {
  return /^(\d{1,3}\.){3}\d{1,3}$/.test(ip) && ip.split('.').every(o => +o >= 0 && +o <= 255);
}

function calculate() {
  let ip = document.getElementById('ip').value.trim();
  let cidr = parseInt(document.getElementById('cidr').value.trim());

  if (!isValidIp(ip)) { alert('Invalid IP address'); return; }
  if (isNaN(cidr) || cidr < 0 || cidr > 32) { alert('CIDR must be 0-32'); return; }

  const ipLong = ipToLong(ip);
  const mask = cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;
  const wildcard = (~mask) >>> 0;
  const network = (ipLong & mask) >>> 0;
  const broadcast = (network | wildcard) >>> 0;
  const totalHosts = Math.pow(2, 32 - cidr);
  const usableHosts = totalHosts > 2 ? totalHosts - 2 : 0;
  const firstHost = usableHosts > 0 ? longToIp(network + 1) : longToIp(network);
  const lastHost = usableHosts > 0 ? longToIp(broadcast - 1) : longToIp(broadcast);
  const ipClass = ip.split('.')[0] < 128 ? 'A' : ip.split('.')[0] < 192 ? 'B' : ip.split('.')[0] < 224 ? 'C' : ip.split('.')[0] < 240 ? 'D (Multicast)' : 'E (Reserved)';
  const isPrivate = (ip.split('.')[0] === 10) || (ip.split('.')[0] === 172 && +ip.split('.')[1] >= 16 && +ip.split('.')[1] <= 31) || (ip.split('.')[0] === 192 && +ip.split('.')[1] === 168);

  const maskDotted = longToIp(mask);
  const wildcardDotted = longToIp(wildcard);

  const items = [
    { label: 'Network Address', value: longToIp(network), highlight: true },
    { label: 'Broadcast Address', value: longToIp(broadcast), highlight: true },
    { label: 'Subnet Mask', value: maskDotted },
    { label: 'Wildcard Mask', value: wildcardDotted },
    { label: 'CIDR Notation', value: `${longToIp(network)}/${cidr}` },
    { label: 'IP Class', value: ipClass },
    { label: 'Private IP', value: isPrivate ? 'Yes (RFC 1918)' : 'No (Public)' },
    { label: 'Total Addresses', value: totalHosts.toLocaleString() },
    { label: 'Usable Hosts', value: usableHosts.toLocaleString() },
    { label: 'First Host', value: firstHost },
    { label: 'Last Host', value: lastHost },
    { label: 'Binary Subnet Mask', value: toBin(mask >>> 24) + '.' + toBin((mask >> 16) & 255) + '.' + toBin((mask >> 8) & 255) + '.' + toBin(mask & 255) },
  ];

  const grid = document.getElementById('resultGrid');
  grid.innerHTML = items.map(i => `
    <div class="result-item">
      <button class="copy-btn" onclick="copyText(this,'${i.value.replace(/'/g,"\\'")}')" title="Copy">&#128203;</button>
      <div class="label">${i.label}</div>
      <div class="value ${i.highlight ? 'highlight' : ''}">${i.value}</div>
    </div>
  `).join('');

  // Binary view
  const ipParts = ip.split('.');
  const netParts = longToIp(network).split('.');
  let binHtml = '';
  for (let i = 0; i < 4; i++) {
    const ipBin = toBin(+ipParts[i]);
    const netBin = toBin(+netParts[i]);
    binHtml += `<div><span style="color:var(--ink)">IP:   ${ipBin.slice(0,cidr - i*8 > 0 ? Math.min(cidr - i*8, 8) : 0)}</span><span style="color:var(--acc)">${ipBin.slice(cidr - i*8 > 0 ? Math.min(cidr - i*8, 8) : 0)}</span> <span style="color:var(--muted)">. </span><span style="color:var(--muted)">Net: ${netBin}</span></div>`;
  }
  binHtml += `<div style="margin-top:4px;color:var(--acc)">█ Network bits (${cidr}) &nbsp; <span style="color:var(--acc2)">█ Host bits (${32 - cidr})</span></div>`;
  document.getElementById('binaryView').innerHTML = binHtml;

  // Host range
  document.getElementById('hostRange').innerHTML = `${firstHost} — ${lastHost}`;
  document.getElementById('totalHosts').innerHTML = `${totalHosts.toLocaleString()} total addresses, ${usableHosts.toLocaleString()} usable hosts`;

  document.getElementById('results').classList.add('show');
}

function preset(n) {
  document.getElementById('cidr').value = n;
  calculate();
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 1500);
  });
}

// Auto-calculate on load
calculate();
</script>
